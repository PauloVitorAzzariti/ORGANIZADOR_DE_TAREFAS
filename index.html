<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TaskFlow • Gerenciador de Tarefas</title>
  <style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Ubuntu, Cantarell, Arial, sans-serif;
    background: #0f1220;
    color: #e7e9ee;
  }

  :root{
    --bg: #0f1220;
    --panel: #151a2d;
    --muted: #9aa3b2;
    --border: #232a46;
    --primary: #7c5cff;
    --primary-2: #5b3df7;
    --success: #2ecc71;
    --warning: #f1c40f;
    --danger: #e74c3c;
    --shadow: 0 10px 30px rgba(0,0,0,.35);
    --radius: 16px;
  }

  .app {
    display: grid;
    grid-template-columns: 280px 1fr;
    grid-template-rows: 64px auto 1fr;
    gap: 16px;
    padding: 16px;
    max-width: 1500px;
    margin: 0 auto;
  }

  header {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 12px;
    box-shadow: var(--shadow);
    flex-wrap: wrap;
  }

  .logo {
    display:flex;
    align-items:center;
    gap:10px;
    padding:8px 10px;
    border-radius: 12px;
    background: linear-gradient(135deg, rgba(124,92,255,.25), rgba(91,61,247,.15));
    border: 1px solid var(--border);
    white-space: nowrap;
  }
  .logo .dot{ width: 10px; height: 10px; border-radius: 50%; background: var(--primary); box-shadow: 0 0 20px var(--primary); }
  .logo span{ font-weight: 700; letter-spacing:.3px; }

  .search {
    flex:1;
    display:flex;
    align-items:center;
    gap:8px;
    background:#0d1122;
    border:1px solid var(--border);
    border-radius:12px;
    padding: 8px 12px;
    min-width: 160px;
  }
  .search input{
    flex:1;
    background: transparent;
    border: none;
    outline: none;
    color: #e7e9ee;
    font-size: 14px;
  }

  .toolbar {
    display:flex;
    align-items:center;
    gap:8px;
    flex-wrap: wrap;
  }

  .btn {
    cursor:pointer;
    border:1px solid var(--border);
    background: #0d1122;
    color:#e7e9ee;
    padding:10px 12px;
    border-radius:12px;
    font-weight:600;
    transition: transform .06s ease, background .2s ease, border .2s ease;
    white-space: nowrap;
  }
  .btn:hover{ background:#131735; }
  .btn:active{ transform: translateY(1px); }
  .btn.primary{
    background: linear-gradient(135deg, var(--primary), var(--primary-2));
    border-color: transparent;
  }

  aside {
    background: var(--panel);
    border:1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    box-shadow: var(--shadow);
    grid-row: 3;
    grid-column: 1;
    overflow-y: auto;
    max-height: calc(100vh - 150px);
  }

  .aside-section{
    padding:10px;
    border:1px solid var(--border);
    border-radius:12px;
    background:#0d1122;
    margin-bottom:10px;
  }
  .aside-section h4{
    margin: 0 0 8px 0;
    font-size: 13px;
    color: var(--muted);
    font-weight:700;
    letter-spacing:.4px;
    text-transform:uppercase;
  }

  .stats{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:10px;
  }
  .stat{
    background: linear-gradient(180deg, rgba(124,92,255,.12), rgba(124,92,255,.02));
    border:1px solid var(--border);
    border-radius:12px;
    padding:10px;
    font-size: 12px;
  }
  .stat b{ font-size: 18px; display: block; margin-top: 4px; }

  .clients-tabs {
    grid-column: 1 / -1;
    display: flex;
    gap: 8px;
    align-items: center;
    overflow-x: auto;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 12px;
  }

  .client-tab {
    position: relative;
    cursor: pointer;
    padding: 10px 14px;
    border: 1px solid var(--border);
    background: #0d1122;
    color: #e7e9ee;
    border-radius: 10px;
    white-space: nowrap;
    font-weight: 600;
    font-size: 13px;
    transition: background .2s ease, border-color .2s ease;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .client-tab:hover { background: #131735; }
  .client-tab.active {
    background: linear-gradient(135deg, var(--primary), var(--primary-2));
    border-color: transparent;
    box-shadow: 0 0 15px rgba(124,92,255,.3);
  }

  .del-client-btn {
    opacity: 0.5;
    font-size: 14px;
    padding: 2px 4px;
    border-radius: 4px;
    transition: opacity 0.2s;
  }
  .del-client-btn:hover { opacity: 1; background: rgba(255,255,255,0.1); }

  .client-tab.add-client {
    background: #0d1122;
    border: 1px dashed var(--border);
    color: var(--primary);
    margin-left: auto;
  }

  main{
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    grid-row: 3;
    grid-column: 2 / -1;
  }

  .column{
    background: var(--panel);
    border:1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px;
    box-shadow: var(--shadow);
    display:flex;
    flex-direction:column;
    min-height: 60vh;
  }

  .column h3{
    margin: 0 0 8px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    font-size: 15px;
    letter-spacing:.3px;
  }
  .column h3 span{ color: var(--muted); font-weight:600; font-size: 12px; }

  .dropzone{
    flex:1;
    display:flex;
    flex-direction:column;
    gap: 10px;
    padding: 6px;
    border-radius: 12px;
    background: repeating-linear-gradient(45deg, #0b0f1f, #0b0f1f 10px, #0d1122 10px, #0d1122 20px);
    border:1px dashed var(--border);
    transition: background .2s ease, border-color .2s ease;
  }
  .dropzone.dragover{ background: rgba(124,92,255,.08); border-color: var(--primary); }

  .card{
    user-select:none;
    background:#0b0f1f;
    border:1px solid var(--border);
    border-radius: 14px;
    padding: 12px;
    display:flex;
    flex-direction:column;
    gap: 8px;
    box-shadow: var(--shadow);
    cursor: grab;
  }
  .card .title{ font-weight:700; font-size: 14px; }
  .card .meta{ display:flex; align-items:center; gap:8px; color: var(--muted); font-size: 12px; flex-wrap: wrap; }

  .tag{
    display:inline-flex;
    align-items:center;
    gap:6px;
    border:1px solid var(--border);
    padding:6px 8px;
    border-radius:999px;
    font-size:11px;
    background:#0f152e;
  }
  .tag.success{ color: var(--success); }
  .tag.warn{ color: var(--warning); }
  .tag.danger{ color: var(--danger); }

  .actions{ display:flex; justify-content:space-between; align-items:center; margin-top: 2px; }
  .icon-btn{
    cursor:pointer;
    background:transparent;
    border:1px solid var(--border);
    padding: 6px 8px;
    border-radius: 8px;
    color:#cbd1de;
    font-size:12px;
  }
  .icon-btn:hover{ background:#141936; }

  .empty{
    opacity:.65;
    text-align:center;
    padding: 20px;
    border:1px dashed var(--border);
    border-radius:12px;
    font-size: 13px;
  }

  .modal{
    position: fixed;
    inset: 0;
    display:none;
    align-items:center;
    justify-content:center;
    background: rgba(0,0,0,.55);
    padding: 20px;
    z-index: 1000;
  }
  .modal.open{ display:flex; }
  .modal .content{
    width: 100%;
    max-width: 520px;
    background: var(--panel);
    border:1px solid var(--border);
    border-radius: 16px;
    padding: 14px;
    box-shadow: var(--shadow);
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal .content h3{ margin: 4px 0 10px; }
  .field{ display:grid; gap:6px; margin-bottom:10px; }
  .field label{ font-size: 13px; color: var(--muted); }
  .field input, .field textarea, .field select{
    width:100%;
    background:#0b0f1f;
    border:1px solid var(--border);
    color:#e7e9ee;
    padding:10px 12px;
    border-radius:10px;
  }
  .row{ display:grid; grid-template-columns: 1fr 1fr; gap:10px; }

  @media (max-width: 1024px){
    .app{ grid-template-columns: 1fr; }
    aside{ grid-row: auto; grid-column: auto; }
    main{ grid-column: auto; grid-template-columns: repeat(2, 1fr); }
  }

  @media (max-width: 768px){
    main{ grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
  <div class="app">
    <header>
      <div class="logo">
        <div class="dot"></div>
        <span>TaskFlow</span>
      </div>
      <div class="search">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M11 19a8 8 0 1 1 0-16 8 8 0 0 1 0 16Zm10 1-4.35-4.35" stroke="#9aa3b2" stroke-width="1.5" stroke-linecap="round"/></svg>
        <input id="search" placeholder="Buscar tarefas..." />
      </div>
      <div class="toolbar">
        <select id="priorityFilter" class="btn">
          <option value="">Prioridade: Todas</option>
          <option value="alta">Alta</option>
          <option value="media">Média</option>
          <option value="baixa">Baixa</option>
        </select>
        <button class="btn" id="clearFilters">Limpar</button>
        <button class="btn primary" id="addTaskBtn">+ Nova Tarefa</button>
      </div>
    </header>

    <div class="clients-tabs" id="clientsTabs">
      <button class="client-tab active" data-client="">Todos os Clientes</button>
      <button class="client-tab add-client" id="addClientBtn">+ Novo Cliente</button>
    </div>

    <aside>
      <div class="aside-section">
        <h4>💰 Resumo Financeiro</h4>
        <div class="stats">
          <div class="stat"><div>A Receber</div><b id="total-receber" style="color: var(--success)">R$ 0</b></div>
          <div class="stat"><div>Pendente</div><b id="total-pendente" style="color: var(--warning)">R$ 0</b></div>
        </div>
        <div style="margin-top:10px; font-size:11px; color:var(--muted); border-top: 1px solid var(--border); padding-top: 8px;">
          <div>Pago: <b id="total-pago" style="color: var(--success)">R$ 0</b></div>
        </div>
      </div>

      <div class="aside-section">
        <h4>📊 Edições de Vídeo</h4>
        <div class="stats">
          <div class="stat"><div>Total</div><b id="stat-total">0</b></div>
          <div class="stat"><div>Concluídas</div><b id="stat-done">0</b></div>
        </div>
      </div>

      <div class="aside-section">
        <h4>👥 Por Cliente</h4>
        <div id="clientsSummary" style="display:grid;gap:8px;font-size:12px">
          <div style="text-align:center;color:var(--muted)">Carregando...</div>
        </div>
      </div>
    </aside>

    <main>
      <section class="column" data-status="todo">
        <h3>A fazer <span id="count-todo">0</span></h3>
        <div class="dropzone" data-zone="todo"></div>
      </section>
      <section class="column" data-status="doing">
        <h3>Em progresso <span id="count-doing">0</span></h3>
        <div class="dropzone" data-zone="doing"></div>
      </section>
      <section class="column" data-status="done">
        <h3>Concluído <span id="count-done">0</span></h3>
        <div class="dropzone" data-zone="done"></div>
      </section>
    </main>
  </div>

  <div class="modal" id="taskModal">
    <div class="content">
      <h3 id="modalTitle">Nova tarefa</h3>
      <form id="taskForm">
        <input type="hidden" id="taskId" />
        <div class="field">
          <label for="title">Título *</label>
          <input id="title" required placeholder="Ex: Logo Design" />
        </div>
        <div class="field">
          <label for="description">Descrição</label>
          <textarea id="description" rows="2" placeholder="Detalhes do serviço..."></textarea>
        </div>
        <div class="field">
          <label for="client">Cliente *</label>
          <select id="client" required>
            <option value="">Selecione um cliente...</option>
          </select>
        </div>
        <div class="row">
          <div class="field">
            <label for="serviceType">Tipo de Serviço *</label>
            <select id="serviceType" required onchange="toggleFilmingFields()">
              <option value="edicao">📝 Edição</option>
              <option value="filmagem">🎥 Filmagem</option>
            </select>
          </div>
          <div class="field">
            <label for="value">Valor (R$) *</label>
            <input id="value" type="number" required placeholder="0.00" step="0.01" min="0" />
          </div>
        </div>
        <div class="row">
          <div class="field" id="filmingDateField" style="display:none;">
            <label for="filmingDate">Data da Filmagem</label>
            <input id="filmingDate" type="date" />
          </div>
          <div class="field">
            <label for="paymentStatus">Status de Pagamento</label>
            <select id="paymentStatus">
              <option value="pendente">⏳ Pendente</option>
              <option value="50">🌓 50% Pago</option>
              <option value="pago">✅ Pago</option>
            </select>
          </div>
        </div>
        <div class="row">
          <div class="field">
            <label for="priority">Prioridade</label>
            <select id="priority">
              <option value="alta">Alta</option>
              <option value="media" selected>Média</option>
              <option value="baixa">Baixa</option>
            </select>
          </div>
          <div class="field">
            <label for="dueDate">Prazo</label>
            <input id="dueDate" type="date" />
          </div>
        </div>
        <div style="display:flex; gap:8px; justify-content:flex-end; margin-top:6px;">
          <button type="button" class="btn" onclick="document.getElementById('taskModal').classList.remove('open')">Cancelar</button>
          <button type="submit" class="btn primary">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <div class="modal" id="clientModal">
    <div class="content">
      <h3>Novo Cliente</h3>
      <form id="clientForm">
        <div class="field">
          <label for="clientName">Nome do Cliente *</label>
          <input id="clientName" required placeholder="Ex.: Empresa XYZ" />
        </div>
        <div style="display:flex; gap:8px; justify-content:flex-end; margin-top:6px;">
          <button type="button" class="btn" onclick="document.getElementById('clientModal').classList.remove('open')">Cancelar</button>
          <button type="submit" class="btn primary">Criar</button>
        </div>
      </form>
    </div>
  </div>

  <script>
let state = { tasks: [], clients: [], selectedClient: '' };

function toggleFilmingFields() {
  const type = document.getElementById('serviceType').value;
  document.getElementById('filmingDateField').style.display = type === 'filmagem' ? '' : 'none';
}

function loadData() {
  state.tasks = JSON.parse(localStorage.getItem('tasks') || '[]');
  state.clients = JSON.parse(localStorage.getItem('clients') || '[]');
  state.selectedClient = localStorage.getItem('selectedClient') || '';
}

function saveData() {
  localStorage.setItem('tasks', JSON.stringify(state.tasks));
  localStorage.setItem('clients', JSON.stringify(state.clients));
  localStorage.setItem('selectedClient', state.selectedClient);
}

function addClient(name) {
  const client = { id: Date.now().toString(), name: name.trim() };
  state.clients.push(client);
  saveData();
  refreshUI();
}

function deleteClient(id, event) {
  event.stopPropagation();
  if(!confirm("Excluir este cliente e todas as suas tarefas?")) return;
  state.tasks = state.tasks.filter(t => t.client !== id);
  state.clients = state.clients.filter(c => c.id !== id);
  if(state.selectedClient === id) state.selectedClient = '';
  saveData();
  refreshUI();
}

function refreshUI() {
  renderTabs();
  renderSelect();
  render();
  updateFinancialSummary();
}

function renderTabs() {
  const container = document.getElementById('clientsTabs');
  container.innerHTML = `<button class="client-tab ${!state.selectedClient ? 'active' : ''}" data-client="">Todos os Clientes</button>`;
  
  state.clients.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'client-tab' + (c.id === state.selectedClient ? ' active' : '');
    btn.dataset.client = c.id;
    btn.innerHTML = `${c.name} <span class="del-client-btn" onclick="deleteClient('${c.id}', event)">✕</span>`;
    container.appendChild(btn);
  });

  const addBtn = document.createElement('button');
  addBtn.className = 'client-tab add-client';
  addBtn.id = 'addClientBtn';
  addBtn.textContent = '+ Novo Cliente';
  container.appendChild(addBtn);
}

function renderSelect() {
  const sel = document.getElementById('client');
  sel.innerHTML = '<option value="">Selecione um cliente...</option>';
  state.clients.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c.id;
    opt.textContent = c.name;
    sel.appendChild(opt);
  });
}

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  const p = document.getElementById('priorityFilter').value;
  
  let tasks = state.tasks.filter(t => {
    let ok = true;
    if(q) ok = t.title.toLowerCase().includes(q) || (t.description || '').toLowerCase().includes(q);
    if(p) ok = ok && t.priority === p;
    if(state.selectedClient) ok = ok && t.client === state.selectedClient;
    return ok;
  });

  const zones = ['todo', 'doing', 'done'];
  zones.forEach(z => {
    const el = document.querySelector(`[data-zone="${z}"]`);
    el.innerHTML = '';
    const zTasks = tasks.filter(t => t.status === z);
    if(zTasks.length === 0) {
      el.innerHTML = '<div class="empty">Sem tarefas</div>';
    } else {
      zTasks.forEach(t => el.appendChild(createCard(t)));
    }
  });

  // Contadores específicos das colunas (mantêm o filtro de busca/cliente)
  document.getElementById('count-todo').textContent = tasks.filter(t => t.status === 'todo').length;
  document.getElementById('count-doing').textContent = tasks.filter(t => t.status === 'doing').length;
  document.getElementById('count-done').textContent = tasks.filter(t => t.status === 'done').length;

  // Estatísticas do ASIDE: Filtrando apenas por "Edição"
  const onlyEdicao = state.tasks.filter(t => t.serviceType === 'edicao');
  document.getElementById('stat-total').textContent = onlyEdicao.length;
  document.getElementById('stat-done').textContent = onlyEdicao.filter(t => t.status === 'done').length;
}

function createCard(t) {
  const el = document.createElement('article');
  el.className = 'card';
  el.draggable = true;
  el.dataset.id = t.id;

  let payTag = `<span class="tag" style="background: rgba(241,196,15,.2); color: var(--warning)">⏳ Pendente</span>`;
  if(t.paymentStatus === 'pago') payTag = `<span class="tag" style="background: rgba(46,204,113,.2); color: var(--success)">✅ Pago</span>`;
  if(t.paymentStatus === '50') payTag = `<span class="tag" style="background: rgba(124,92,255,.2); color: var(--primary)">🌓 50% Pago</span>`;

  el.innerHTML = `
    <div class="title">${t.title}</div>
    ${t.description ? `<div style="font-size:12px">${t.description}</div>` : ''}
    <div class="meta">
      <span class="tag ${t.priority === 'alta' ? 'danger' : t.priority === 'baixa' ? 'success' : 'warn'}">${t.priority}</span>
      <span class="tag">${t.serviceType === 'filmagem' ? '🎥 Filmagem' : '📝 Edição'}</span>
      ${t.value ? `<span class="tag" style="color: var(--success)">R$ ${parseFloat(t.value).toFixed(2)}</span>` : ''}
      ${payTag}
    </div>
    <div class="actions">
      <button class="icon-btn" data-action="done">✔ Concluir</button>
      <div style="display:flex;gap:6px">
        <button class="icon-btn" data-action="edit">✎ Editar</button>
        <button class="icon-btn" data-action="del">🗑 Excluir</button>
      </div>
    </div>`;

  el.addEventListener('click', e => {
    const btn = e.target.closest('button');
    if(!btn) return;
    if(btn.dataset.action === 'done') { t.status = 'done'; saveData(); render(); }
    if(btn.dataset.action === 'edit') { editTask(t); }
    if(btn.dataset.action === 'del') { state.tasks = state.tasks.filter(x => x.id !== t.id); saveData(); render(); updateFinancialSummary(); }
  });

  el.addEventListener('dragstart', e => { e.dataTransfer.setData('id', t.id); });
  return el;
}

function editTask(t) {
  document.getElementById('modalTitle').textContent = 'Editar tarefa';
  document.getElementById('taskId').value = t.id;
  document.getElementById('title').value = t.title;
  document.getElementById('description').value = t.description;
  document.getElementById('client').value = t.client;
  document.getElementById('serviceType').value = t.serviceType || 'edicao';
  document.getElementById('value').value = t.value || '';
  document.getElementById('filmingDate').value = t.filmingDate || '';
  document.getElementById('paymentStatus').value = t.paymentStatus || 'pendente';
  document.getElementById('priority').value = t.priority;
  document.getElementById('dueDate').value = t.dueDate;
  toggleFilmingFields();
  document.getElementById('taskModal').classList.add('open');
}

function updateFinancialSummary() {
  let totalReceber = 0;
  let totalPago = 0;
  let totalPendente = 0;

  state.tasks.forEach(t => {
    const valor = parseFloat(t.value) || 0;
    if(valor > 0) {
      if(t.paymentStatus === 'pago') {
        totalPago += valor;
      } else if(t.paymentStatus === '50') {
        totalPago += (valor / 2);
        totalPendente += (valor / 2);
      } else {
        totalPendente += valor;
      }
      totalReceber += valor;
    }
  });

  document.getElementById('total-receber').textContent = 'R$ ' + totalReceber.toFixed(2);
  document.getElementById('total-pago').textContent = 'R$ ' + totalPago.toFixed(2);
  document.getElementById('total-pendente').textContent = 'R$ ' + totalPendente.toFixed(2);

  const summary = document.getElementById('clientsSummary');
  if(state.selectedClient) {
    const client = state.clients.find(c => c.id === state.selectedClient);
    if(!client) return;
    const clientTasks = state.tasks.filter(t => t.client === state.selectedClient);
    
    let receber = 0, pago = 0, pendente = 0;
    clientTasks.forEach(t => {
      const valor = parseFloat(t.value) || 0;
      if(valor > 0) {
        if(t.paymentStatus === 'pago') pago += valor;
        else if(t.paymentStatus === '50') { pago += (valor/2); pendente += (valor/2); }
        else pendente += valor;
        receber += valor;
      }
    });

    summary.innerHTML = `
      <div style="border-left: 4px solid var(--primary); padding: 8px; background: rgba(124,92,255,.1); border-radius: 4px">
        <div style="font-weight:600; font-size: 13px; margin-bottom: 6px">${client.name}</div>
        <div style="font-size: 12px; margin-bottom: 3px">A Receber: <b style="color: var(--success)">R$ ${receber.toFixed(2)}</b></div>
        <div style="font-size: 12px; margin-bottom: 3px">Pago: <b style="color: var(--success)">R$ ${pago.toFixed(2)}</b></div>
        <div style="font-size: 12px">Pendente: <b style="color: var(--warning)">R$ ${pendente.toFixed(2)}</b></div>
      </div>
    `;
  } else {
    let html = '';
    state.clients.forEach(client => {
      const clientTasks = state.tasks.filter(t => t.client === client.id);
      let receber = 0;
      clientTasks.forEach(t => receber += (parseFloat(t.value) || 0));
      if(receber > 0) {
        html += `<div style="border-left: 3px solid var(--primary); padding-left: 8px; margin-bottom: 8px; padding: 6px; background: rgba(124,92,255,.08); border-radius: 4px">
          <div style="font-weight:600;font-size:12px">${client.name}</div>
          <div style="font-size:11px; margin-top: 4px">R$ ${receber.toFixed(2)}</div>
        </div>`;
      }
    });
    summary.innerHTML = html || '<div style="text-align:center;color:var(--muted);font-size:11px">Nenhum serviço lançado</div>';
  }
}

document.getElementById('addTaskBtn').addEventListener('click', () => {
  document.getElementById('taskId').value = '';
  document.getElementById('taskForm').reset();
  document.getElementById('modalTitle').textContent = 'Nova tarefa';
  document.getElementById('serviceType').value = 'edicao';
  toggleFilmingFields();
  document.getElementById('taskModal').classList.add('open');
});

document.getElementById('taskForm').addEventListener('submit', e => {
  e.preventDefault();
  const id = document.getElementById('taskId').value;
  const clientId = document.getElementById('client').value;
  if(!clientId) { alert('Selecione um cliente'); return; }
  
  const task = {
    id: id || Date.now().toString(),
    title: document.getElementById('title').value,
    description: document.getElementById('description').value,
    priority: document.getElementById('priority').value,
    dueDate: document.getElementById('dueDate').value,
    status: 'todo',
    client: clientId,
    serviceType: document.getElementById('serviceType').value,
    value: document.getElementById('value').value,
    filmingDate: document.getElementById('filmingDate').value,
    paymentStatus: document.getElementById('paymentStatus').value
  };
  
  if(id) {
    state.tasks = state.tasks.map(t => t.id === id ? task : t);
  } else {
    state.tasks.push(task);
  }
  saveData();
  render();
  updateFinancialSummary();
  document.getElementById('taskModal').classList.remove('open');
});

document.getElementById('clearFilters').addEventListener('click', () => {
  document.getElementById('search').value = '';
  document.getElementById('priorityFilter').value = '';
  render();
});

document.getElementById('search').addEventListener('input', render);
document.getElementById('priorityFilter').addEventListener('change', render);

document.querySelectorAll('.dropzone').forEach(z => {
  z.addEventListener('dragover', e => { e.preventDefault(); z.classList.add('dragover'); });
  z.addEventListener('dragleave', () => z.classList.remove('dragover'));
  z.addEventListener('drop', e => {
    e.preventDefault();
    z.classList.remove('dragover');
    const id = e.dataTransfer.getData('id');
    const t = state.tasks.find(x => x.id === id);
    if(t) { t.status = z.dataset.zone; saveData(); render(); }
  });
});

document.getElementById('clientForm').addEventListener('submit', e => {
  e.preventDefault();
  const name = document.getElementById('clientName').value;
  if(!name) { alert('Informe o nome'); return; }
  addClient(name);
  document.getElementById('clientName').value = '';
  document.getElementById('clientModal').classList.remove('open');
});

document.addEventListener('click', e => {
  const tab = e.target.closest('.client-tab');
  if(tab && e.target.className !== 'del-client-btn') {
    if(tab.dataset.client !== undefined) {
      state.selectedClient = tab.dataset.client;
      saveData();
      refreshUI();
    }
    if(tab.id === 'addClientBtn') {
      document.getElementById('clientModal').classList.add('open');
    }
  }
});

loadData();
refreshUI();
  </script>
</body>
</html>
